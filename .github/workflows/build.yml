# ── .github/workflows/build.yml ─────────────────────────────────────────────
# Workflow de GitHub Actions.
# Se ejecuta automáticamente cada vez que subes código (push).
# Compila todos los plugins y publica los .cs3 en la rama "builds".
# Esa rama es la que apunta tu repo.json (el repositorio que instala CloudStream).

name: Build Plugins

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Permite ejecutarlo manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0   # Necesario para poder hacer push a otra rama

      # 2. Instalar Java 17 (requerido por Android/Kotlin)
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Caché de Gradle para acelerar builds futuros
      - name: Cache Gradle
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts') }}

      # 4. Dar permisos de ejecución a gradlew
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 5. Compilar todos los plugins → genera archivos .cs3 en builds/
      - name: Build all plugins
        run: ./gradlew make

      # 6. Generar repo.json con la lista de plugins compilados
      - name: Generate repo.json
        run: ./gradlew makePluginsJson

      # 7. Publicar los .cs3 y repo.json en la rama "builds"
      - name: Deploy to builds branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: builds
          folder: builds       # Carpeta generada por el paso 4
          clean: true
